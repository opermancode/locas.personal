apply plugin: "com.android.application"

android {
    compileSdkVersion 33

    defaultConfig {
        applicationId "com.locasdot.personal"
        minSdkVersion 21
        targetSdkVersion 33
        versionCode (project.findProperty("VERSION_CODE") ?: "1").toInteger()
        versionName project.findProperty("VERSION_NAME") ?: "1.0"

        multiDexEnabled true
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
        }
    }

    packagingOptions {
        pickFirst "**/libc++_shared.so"
    }
}

dependencies {
    implementation "com.facebook.react:react-android:0.72.0"
}
